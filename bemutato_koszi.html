    <script>
            // Lead mĂ©rĂ©s logika - javĂ­tott verziĂł
            (function () {
                const urlParams = new URLSearchParams(window.location.search);
                const isLead = urlParams.get("lead") === "1";

                if (!isLead) return;

                console.log("Lead paramĂ©ter Ă©szlelve, pixel tracking indul...");

                let leadTracked = false;
                let attempts = 0;
                const maxAttempts = 40; // 40 * 500ms = 20 mĂˇsodperc max vĂˇrakozĂˇs

                function trackLead() {
                    if (leadTracked) return;

                    attempts++;
                    console.log(`Lead tracking attempt ${attempts}/${maxAttempts}`);

                    // Ha a pixel elĂ©rhetĹ‘, track-eljĂĽk
                    if (typeof fbq === 'function') {
                        try {
                            fbq('track', 'Lead');
                            leadTracked = true;
                            console.log("âś… Facebook Lead event sikeresen elkĂĽldve!");
                            return true;
                        } catch (e) {
                            console.error("Pixel tracking hiba:", e);
                        }
                    }

                    // Ha elĂ©rtĂĽk a max prĂłbĂˇlkozĂˇst, ĂˇllĂ­tsuk le
                    if (attempts >= maxAttempts) {
                        console.log("âš ď¸Ź Lead tracking timeout - pixel nem tĂ¶ltĹ‘dĂ¶tt be (consent hiĂˇny vagy adblock)");
                        return true; // ĂllĂ­tsuk le a retry-t
                    }

                    return false; // Folytassuk a prĂłbĂˇlkozĂˇst
                }

                // ElsĹ‘ prĂłbĂˇlkozĂˇs azonnal
                if (!trackLead()) {
                    // Ha nem sikerĂĽlt, ĂĽtemezett ĂşjraprĂłbĂˇlkozĂˇs
                    const checkInterval = setInterval(() => {
                        if (trackLead()) {
                            clearInterval(checkInterval);
                        }
                    }, 500);
                }
            })();
    </script>
